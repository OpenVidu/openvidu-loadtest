# yaml-language-server: $schema=../../../../../../schema/openvidu-loadtest-schema.json
# Integration test configuration for scale test with reconnection failure
# Tests participants with reconnection failure simulation

platform:
  url: https://mock-openvidu.example.com:4443
  apiKey: testkey
  apiSecret: testsecret

testcases:
  - topology: N:N
    participants:
      - "5"
    sessions: infinite
    browser: chrome
    description: "Scale test with participant reconnection failure"

aws:
  accessKey: test
  secretAccessKey: test
  # ami id and security group are auto generated by the test setup
  instanceType: t3.large
  keyPairName: test-key-pair
  region: us-east-1
  availabilityZone: us-east-1a
  workersAtStart: 10     # Start with 10 workers
  rampUpWorkers: 5       # Ramp up by 5 workers as needed

distribution:
  usersPerWorker: 4   # Allow up to 4 participants per worker

advanced:
  batches:
    enabled: true
    maxConcurrentRequests: 10
  reportOutput:
    - html
    - txt
