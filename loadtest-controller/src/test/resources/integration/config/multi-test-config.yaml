# yaml-language-server: $schema=../../../../../../schema/openvidu-loadtest-schema.json
# Integration test configuration for testing multiple test cases in a single run.
# This config is for running integration tests with mocked browser-emulator

platform:
  url: https://openvidu-test.io:7443
  apiKey: devkey
  apiSecret: secret

testcases:
  - topology: N:N
    participants:
      - "5"
    sessions: 5
    browser: chrome
    description: "Basic N:N topology test"
  
  - topology: N:M
    participants:
      - "3:40"
    sessions: 5
    browser: firefox
    description: "N:1 topology test with more participants per session"

  - topology: TEACHING
    participants:
      - "1:100"
    sessions: 3
    browser: emulated
    description: "Teaching topology test with 1 teacher and 100 students"

workers:
  urls:
    - localhost

distribution:
  usersPerWorker: 500

advanced:
  reportOutput:
    - html
    - txt
