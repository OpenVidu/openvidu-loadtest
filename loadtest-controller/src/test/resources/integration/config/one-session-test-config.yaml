# yaml-language-server: $schema=../../../../../../schema/openvidu-loadtest-schema.json
# Integration test configuration for testing One Session topologies in a single run.
# This config is for running integration tests with mocked browser-emulator

platform:
  url: https://openvidu-test.io:7443
  apiKey: devkey
  apiSecret: secret

testcases:
  - topology: ONE_SESSION_NXN
    participants:
      - "10"
    browser: emulated
    description: "One Session NXN topology test with 10 participants"

  - topology: ONE_SESSION_NXM
    participants:
      - "5:10"
    browser: emulated
    description: "One Session NXM topology test with 5 publishers and 10 subscribers"

workers:
  urls:
    - localhost

distribution:
  usersPerWorker: 500

advanced:
  reportOutput:
    - html
    - txt