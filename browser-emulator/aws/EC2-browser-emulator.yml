AWSTemplateFormatVersion: 2010-09-09
Description: Browser Emulator

Parameters:
    ImageId:
        Type: AWS::EC2::Image::Id
        Description: A base Amazon EC2 image ID.
        Default: ami-0b6c6ebed2801a5cb
    GitRef:
        Type: String
        Description: Git tag or branch to checkout (e.g., 'v4.0.0', 'main', 'develop')
        Default: 'v4.0.0'
    KeyName:
        Type: String
        Description: (Optional) Name of an existing EC2 KeyPair to enable SSH access. Leave empty to not set a key.
        Default: ''
    CacheMediaFilesArgs:
        Type: String
        Description: Cache media files by resolution and fps if you are going to create multiple instances and want to save time and bandwidth. Use '__enabled__' to cache all media files or specify resolutions and fps (e.g., '1080x60 720x30') to cache only specific combinations. If not set or set to '__disabled__', media files will not be cached.
        Default: '__disabled__'

Conditions:
    HasKeyName: !Not [!Equals [!Ref KeyName, '']]

Resources:
    BrowserInstance:
        Type: AWS::EC2::Instance
        CreationPolicy:
            ResourceSignal:
                Timeout: PT1H
                Count: 1
        Properties:
            ImageId: !Ref ImageId
            KeyName: !If [HasKeyName, !Ref KeyName, !Ref AWS::NoValue]
            InstanceType: 't3.xlarge'
            Tags:
                - Key: Name
                  Value: !Ref AWS::StackName
            # Add KeyName: [your ssh key] to be able to access this instance
            BlockDeviceMappings:
                - DeviceName: '/dev/sda1'
                  Ebs:
                      VolumeType: 'gp2'
                      DeleteOnTermination: 'true'
                      VolumeSize: '50'
            UserData:
                'Fn::Base64': !Sub |
                    #!/bin/bash
                    git clone https://github.com/OpenVidu/openvidu-loadtest.git /opt/openvidu-loadtest
                    cd /opt/openvidu-loadtest/browser-emulator
                    git checkout ${GitRef}
                    echo 'AWS_STACK=${AWS::StackId}' | sudo tee -a /etc/environment
                    echo 'AWS_REGION=${AWS::Region}' | sudo tee -a /etc/environment
                    if [ "${CacheMediaFilesArgs}" != "__disabled__" ]; then
                      if [ "${CacheMediaFilesArgs}" = "__enabled__" ]; then
                        ./prepare_scripts/download_mediafiles.sh > /var/log/download_mediafiles.log 2>&1
                      else
                        ./prepare_scripts/download_mediafiles.sh ${CacheMediaFilesArgs} > /var/log/download_mediafiles.log 2>&1
                      fi
                    fi
                    chmod +x ./prepare_scripts/*.sh
                    chmod +x ./*.sh
                    ./prepare_scripts/install_base.sh > /var/log/install.log 2>&1
                    echo "@reboot cd /opt/openvidu-loadtest/browser-emulator && /usr/bin/docker compose -f docker-compose.yml up -d --build > /var/log/docker_compose_reboot.log 2>&1" | crontab -u ubuntu -
                    apt-get install -y python3-pip linux-aws-edge
                    ./notify-aws.sh > /var/log/notify_aws.log 2>&1
