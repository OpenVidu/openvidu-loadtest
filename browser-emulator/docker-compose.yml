services:
    browser-emulator:
        build:
            context: .
            dockerfile: Dockerfile
        image: browser-emulator:local
        container_name: browser-emulator
        restart: unless-stopped
        environment:
            SERVER_PORT: ${SERVER_PORT:-5000}
            COM_MODULE: ${COM_MODULE:-openvidu}
        ports:
            - '${SERVER_PORT:-5000}:${SERVER_PORT:-5000}'
        shm_size: 2gb
        networks:
            - browseremulator
        volumes:
            - ./recordings/chrome:/app/recordings/chrome
            - ./recordings/qoe:/app/recordings/qoe
            - ./stats:/app/stats
            - ./logs:/app/logs
            - ./mediafiles:/app/mediafiles
            - /var/run/docker.sock:/var/run/docker.sock

networks:
    browseremulator:
        name: browseremulator
