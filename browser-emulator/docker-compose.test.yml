services:
    browser-emulator-tests:
        build:
            context: .
            dockerfile: Dockerfile.test
        image: browser-emulator:test
        container_name: browser-emulator-tests
        restart: no
        environment:
            SERVER_PORT: ${SERVER_PORT:-5000}
            COM_MODULE: ${COM_MODULE:-livekit}
            RUNNING_IN_DOCKER: true
            DOCKER_NETWORK_NAME: browseremulator
            DOCKER_BROWSER_EMULATOR_HOST: browser-emulator-tests
            DISABLE_HTTPS: true
            MEDIAFILES_HOST_DIR: ${MEDIAFILES_HOST_DIR:-${PWD}/mediafiles}
            SCRIPTS_LOGS_HOST_DIR: ${SCRIPTS_LOGS_HOST_DIR:-${PWD}/logs}
        ports:
            - '${SERVER_PORT:-5000}:${SERVER_PORT:-5000}'
        networks:
            - browseremulator
        volumes:
            - ./recordings/chrome:/app/recordings/chrome
            - ./recordings/qoe:/app/recordings/qoe
            - ./stats:/app/stats
            - ./logs:/app/logs
            - ./mediafiles:/app/mediafiles
            - /var/run/docker.sock:/var/run/docker.sock
    livekit-server:
        image: livekit/livekit-server:latest
        container_name: livekit-server
        restart: unless-stopped
        environment:
            LIVEKIT_KEYS: 'devkey: secret'
        networks:
            - browseremulator
networks:
    browseremulator:
        name: browseremulator
