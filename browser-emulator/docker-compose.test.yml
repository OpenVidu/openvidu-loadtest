services:
    browser-emulator-tests:
        build:
            context: .
            dockerfile: Dockerfile.test
        image: browser-emulator:test
        container_name: browser-emulator-tests
        restart: no
        environment:
            # TEST_LIVEKIT_URL should be passed as an environment variable when running the tests, using either openvidu local deployment or a compatible deployment
            TEST_LIVEKIT_URL: ${TEST_LIVEKIT_URL}
            SERVER_PORT: ${SERVER_PORT:-5000}
            WEBSOCKET_PORT: ${WEBSOCKET_PORT:-5001}
            COM_MODULE: ${COM_MODULE:-livekit}
            RUNNING_IN_DOCKER: true
            DOCKER_NETWORK_NAME: browseremulator
            DOCKER_BROWSER_EMULATOR_HOST: browser-emulator-tests
            MEDIAFILES_HOST_DIR: ${MEDIAFILES_HOST_DIR:-${PWD}/mediafiles}
            METRICBEAT_CONFIG: ${METRICBEAT_CONFIG:-${PWD}/browser-emulator/src/assets/metricbeat-config/metricbeat.yml}
            SCRIPTS_LOGS_HOST_DIR: ${SCRIPTS_LOGS_HOST_DIR:-${PWD}/logs}
        ports:
            - '${SERVER_PORT:-5000}:${SERVER_PORT:-5000}'
            - '${WEBSOCKET_PORT:-5001}:${WEBSOCKET_PORT:-5001}'
        networks:
            - browseremulator
        volumes:
            - ./recordings/chrome:/app/recordings/chrome
            - ./recordings/qoe:/app/recordings/qoe
            - ./stats:/app/stats
            - ./logs:/app/logs
            - ./mediafiles:/app/mediafiles
            - /var/run/docker.sock:/var/run/docker.sock
networks:
    browseremulator:
        name: browseremulator
