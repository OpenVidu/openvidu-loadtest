name: Browser Emulator Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ vars.LABEL_WORKER_SELFHOSTED }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
  
      - name: Setup Node.js with pnpm
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: browser-emulator/pnpm-lock.yaml

      - name: Install Vagrant & VirtualBox
        run: |
          sudo bash actions-scripts/install-vagrant-virtualbox.sh

      - name: Resolve Vagrant parent box version and hash
        id: resolve_vagrant_box
        run: |
          bash actions-scripts/resolve-vagrant-box.sh

      - name: Cache Vagrant boxes
        uses: actions/cache@v4
        with:
          path: ~/.vagrant.d/boxes
          key: vagrant-boxes-${{ runner.os }}-${{ steps.resolve_vagrant_box.outputs.box_name }}-${{ steps.resolve_vagrant_box.outputs.box_hash }}-${{ steps.resolve_vagrant_box.outputs.box_version }}-${{ hashFiles('browser-emulator/Vagrantfile') }}
          restore-keys: |
            vagrant-boxes-${{ runner.os }}-${{ steps.resolve_vagrant_box.outputs.box_name }}-${{ steps.resolve_vagrant_box.outputs.box_hash }}-
            vagrant-boxes-${{ runner.os }}-${{ steps.resolve_vagrant_box.outputs.box_name }}-
            vagrant-boxes-${{ runner.os }}-

      - name: Cache Vagrant machine state
        uses: actions/cache@v4
        with:
          path: browser-emulator/.vagrant
          key: vagrant-state-${{ runner.os }}-${{ steps.resolve_vagrant_box.outputs.box_name }}-${{ steps.resolve_vagrant_box.outputs.box_hash }}-${{ hashFiles('browser-emulator/Vagrantfile') }}
          restore-keys: |
            vagrant-state-${{ runner.os }}-${{ steps.resolve_vagrant_box.outputs.box_name }}-${{ steps.resolve_vagrant_box.outputs.box_hash }}-
            vagrant-state-${{ runner.os }}-${{ steps.resolve_vagrant_box.outputs.box_name }}-

      - name: Install project dependencies
        run: |
          cd browser-emulator
          pnpm install

      - name: Run tests
        run: |
          cd browser-emulator
          pnpm run test:all
