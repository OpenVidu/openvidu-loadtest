name: Browser Emulator Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-24.04
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
  
      - name: Setup Node.js with pnpm
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: browser-emulator/pnpm-lock.yaml

      - name: Install Vagrant & VirtualBox
        run: |
          wget -O- https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(grep -oP '(?<=UBUNTU_CODENAME=).*' /etc/os-release || lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt-get update
          sudo apt-get install -y vagrant virtualbox
          # Unload KVM modules to avoid conflict with VirtualBox AMD-V/VT-x extension
          # See: https://github.com/actions/runner-images/issues/13202
          modprobe -r kvm_amd 2>/dev/null || true
          modprobe -r kvm_intel 2>/dev/null || true
          modprobe -r kvm 2>/dev/null || true

      - name: Resolve Vagrant parent box version and hash
        id: resolve_vagrant_box
        run: |
          DEFAULT_BOX=$(sed -n "s/box = ENV\['BOX'\] || '\([^']*\)'.*/\1/p" browser-emulator/Vagrantfile | head -n1)
          DEFAULT_PROVIDER=$(sed -n "s/provider = ENV\['VAGRANT_PROVIDER'\] || '\([^']*\)'.*/\1/p" browser-emulator/Vagrantfile | head -n1)
          BOX_NAME="${BOX:-$DEFAULT_BOX}"
          BOX_PROVIDER="${VAGRANT_PROVIDER:-$DEFAULT_PROVIDER}"
          BOX_USER="${BOX_NAME%%/*}"
          BOX_SHORT_NAME="${BOX_NAME#*/}"

          BOX_METADATA=$(curl -fsSL "https://app.vagrantup.com/api/v1/box/${BOX_USER}/${BOX_SHORT_NAME}" | tr -d '\n')
          BOX_VERSION=$(ruby -rjson -e 'j = JSON.parse(STDIN.read); print(j.dig("current_version", "version").to_s)' <<< "$BOX_METADATA")

          BOX_VERSION_METADATA=$(curl -fsSL "https://app.vagrantup.com/api/v1/box/${BOX_USER}/${BOX_SHORT_NAME}/version/${BOX_VERSION}" | tr -d '\n')
          BOX_HASH=$(BOX_PROVIDER="$BOX_PROVIDER" ruby -rjson -e 'j = JSON.parse(STDIN.read); providers = j["providers"] || []; provider = providers.find { |p| p["name"] == ENV["BOX_PROVIDER"] } || providers.first; print((provider && provider["checksum"]).to_s)' <<< "$BOX_VERSION_METADATA")

          if [ -z "$BOX_VERSION" ]; then
            BOX_VERSION="unknown"
          fi

          if [ -z "$BOX_HASH" ]; then
            BOX_HASH="unknown"
          fi

          echo "box_name=$BOX_NAME" >> "$GITHUB_OUTPUT"
          echo "box_version=$BOX_VERSION" >> "$GITHUB_OUTPUT"
          echo "box_hash=$BOX_HASH" >> "$GITHUB_OUTPUT"

      - name: Cache Vagrant boxes
        uses: actions/cache@v4
        with:
          path: ~/.vagrant.d/boxes
          key: vagrant-boxes-${{ runner.os }}-${{ steps.resolve_vagrant_box.outputs.box_name }}-${{ steps.resolve_vagrant_box.outputs.box_hash }}-${{ steps.resolve_vagrant_box.outputs.box_version }}-${{ hashFiles('browser-emulator/Vagrantfile') }}
          restore-keys: |
            vagrant-boxes-${{ runner.os }}-${{ steps.resolve_vagrant_box.outputs.box_name }}-${{ steps.resolve_vagrant_box.outputs.box_hash }}-
            vagrant-boxes-${{ runner.os }}-${{ steps.resolve_vagrant_box.outputs.box_name }}-
            vagrant-boxes-${{ runner.os }}-

      - name: Cache Vagrant machine state
        uses: actions/cache@v4
        with:
          path: browser-emulator/.vagrant
          key: vagrant-state-${{ runner.os }}-${{ steps.resolve_vagrant_box.outputs.box_name }}-${{ steps.resolve_vagrant_box.outputs.box_hash }}-${{ hashFiles('browser-emulator/Vagrantfile') }}
          restore-keys: |
            vagrant-state-${{ runner.os }}-${{ steps.resolve_vagrant_box.outputs.box_name }}-${{ steps.resolve_vagrant_box.outputs.box_hash }}-
            vagrant-state-${{ runner.os }}-${{ steps.resolve_vagrant_box.outputs.box_name }}-

      - name: Install project dependencies
        run: |
          cd browser-emulator
          pnpm install

      - name: Run tests
        run: |
          cd browser-emulator
          pnpm run test:all
