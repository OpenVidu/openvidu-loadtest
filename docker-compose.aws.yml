services:

  loadtest-controller:
    build:
      context: ./loadtest-controller
      dockerfile: Dockerfile
    image: loadtest-controller:local
    container_name: loadtest-controller
    restart: no
    # Run as the host user so files written to ./results are not owned by root.
    # Override if your user is not 1000:1000:
    #   HOST_UID=$(id -u) HOST_GID=$(id -g) docker compose -f docker-compose.aws.yml up --build
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    environment:
      LOADTEST_CONFIG: ${LOADTEST_CONFIG:-/config/config-aws.yaml}
      RESULTS_DIR: /results
    volumes:
      - ./config:/config
      - ./results:/results